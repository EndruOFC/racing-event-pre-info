  >LÄSSER</text>

  <!-- Trennlinie -->
  <line x1="40" y1="33" x2="292" y2="33" stroke="#F5F5F5" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Subtitle -->
  <text
    x="40" y="48"
    font-family="'Arial',sans-serif"
    font-size="10.5"
    font-weight="400"
    fill="#F5F5F5"
