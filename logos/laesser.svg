<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <!-- Lässer Stickmaschinen AG – Dark-Theme Version -->
  <!-- Swiss Cross -->
  <rect x="4" y="6" width="26" height="26" rx="2" fill="#E8001C"/>
  <rect x="14" y="10" width="6" height="18" rx="1" fill="#FFFFFF"/>
  <rect x="9" y="15" width="16" height="6" rx="1" fill="#FFFFFF"/>

  <!-- LÄSSER -->
  <text
    x="40" y="27"
    font-family="'Arial Black','Arial',sans-serif"
    font-size="22"
    font-weight="900"
    fill="#F5F5F5"
